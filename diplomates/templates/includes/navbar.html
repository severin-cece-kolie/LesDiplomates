{% load static %}
<nav class="navbar" id="navbar">
    <div class="navbar-container">
        <div class="navbar-brand">
            <div class="brand-logo">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                    <rect width="28" height="28" rx="8" fill="#F97316" />
                    <path d="M14 6L20 10V14C20 17.3 17.4 20.4 14 21C10.6 20.4 8 17.3 8 14V10L14 6Z" fill="white" />
                </svg>
            </div>
            <span class="brand-name">Les Diplomates</span>
        </div>

        <div class="navbar-links" id="navLinks">
            <a href="{% url 'actualites:home' %}" class="nav-link {% block nav_home %}{% endblock %}">Accueil</a>
            <a href="{% url 'actualites:cycles' %}" class="nav-link {% block nav_cycles %}{% endblock %}">Cycles</a>
            <a href="{% url 'actualites:reglement' %}"
                class="nav-link {% block nav_reglement %}{% endblock %}">Règlement</a>
            <a href="{% url 'actualites:vie_scolaire' %}" class="nav-link {% block nav_vie %}{% endblock %}">Vie
                Scolaire</a>
            <a href="{% url 'actualites:equipe' %}" class="nav-link {% block nav_equipe %}{% endblock %}">Équipe</a>
            <a href="{% url 'actualites:actualites' %}"
                class="nav-link {% block nav_actualites %}{% endblock %}">Actualités</a>
            <a href="{% url 'actualites:contact' %}" class="nav-link {% block nav_contact %}{% endblock %}">Contact</a>
        </div>

        <div class="navbar-actions">
            {% if user.is_authenticated %}
            <a href="{% url 'accounts:profile' %}" class="btn btn-portal">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
                Mon Profil
            </a>
            <a href="{% url 'accounts:logout' %}" class="btn btn-danger-small">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16,17 21,12 16,7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
            </a>
            {% else %}
            <a href="{% url 'accounts:login' %}" class="btn btn-portal">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3" />
                </svg>
                Se connecter
            </a>
            {% endif %}
            <button class="hamburger" id="hamburger" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </div>
</nav>

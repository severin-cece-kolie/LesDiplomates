<header class="admin-topbar">
    <div class="topbar-search">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input type="text" placeholder="Rechercher...">
    </div>

    <div class="topbar-actions">
        <a href="{% url 'notifications:notifications_list' %}" class="icon-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
            {% if unread_notifications_count %}
            <span class="notif-badge">{{ unread_notifications_count }}</span>
            {% endif %}
        </a>

        <div class="topbar-user">
            <div class="user-info">
                <span class="user-name">{{ user.get_full_name|default:user.username }}</span>
                <span class="user-role">{{ user_role|default:user.role }}</span>
            </div>
            <div class="avatar-sm">
                {{ user.username.0|upper }}
            </div>
            <a href="{% url 'accounts:logout' %}" class="btn-danger-small">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16,17 21,12 16,7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
            </a>
        </div>
    </div>
</header>

<style>
    .admin-topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 28px;
        height: 72px;
        background: white;
        border-bottom: 1px solid #e2e8f0;
        position: sticky;
        top: 0;
        z-index: 900;
    }

    .topbar-search {
        display: flex;
        align-items: center;
        gap: 12px;
        background: #f1f5f9;
        padding: 8px 16px;
        border-radius: 10px;
        flex: 1;
        max-width: 400px;
    }

    .topbar-search input {
        border: none;
        background: none;
        outline: none;
        width: 100%;
        font-size: 0.9rem;
    }

    .topbar-actions {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .icon-btn {
        position: relative;
        background: none;
        border: none;
        padding: 8px;
        color: #64748b;
        cursor: pointer;
        transition: color 0.2s;
    }

    .icon-btn:hover {
        color: var(--orange);
    }

    .notif-badge {
        position: absolute;
        top: 0;
        right: 0;
        background: #ef4444;
        color: white;
        font-size: 0.65rem;
        padding: 2px 6px;
        border-radius: 10px;
        border: 2px solid white;
    }

    .topbar-user {
        display: flex;
        align-items: center;
        gap: 12px;
        border-left: 1px solid #e2e8f0;
        padding-left: 20px;
    }

    .user-info {
        display: flex;
        flex-direction: column;
        text-align: right;
    }

    .user-name {
        font-weight: 600;
        font-size: 0.9rem;
        color: #1e293b;
    }

    .user-role {
        font-size: 0.75rem;
        color: #64748b;
        text-transform: uppercase;
        font-weight: 700;
        letter-spacing: 0.02em;
    }
</style>

<aside class="admin-sidebar">
    <div class="sidebar-brand">
        <div class="brand-logo">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                <rect width="28" height="28" rx="8" fill="#F97316" />
                <path d="M14 6L20 10V14C20 17.3 17.4 20.4 14 21C10.6 20.4 8 17.3 8 14V10L14 6Z" fill="white" />
            </svg>
        </div>
        <div>
            <span class="brand-app">Academia</span>
            <span class="brand-sub">PARENTS</span>
        </div>
    </div>

    <nav class="sidebar-nav">
        <a href="{% url 'eleves:portail' %}"
            class="sidebar-link {% if request.resolver_match.url_name == 'portail' %}active{% endif %}">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7" />
                <rect x="14" y="3" width="7" height="7" />
                <rect x="3" y="14" width="7" height="7" />
                <rect x="14" y="14" width="7" height="7" />
            </svg>
            Tableau de Bord
        </a>
        <a href="{% url 'accounts:profile' %}" class="sidebar-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
            </svg>
            Mon Profil
        </a>
        <a href="{% url 'finance:checkout' %}" class="sidebar-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="5" width="20" height="14" rx="2" />
                <line x1="2" y1="10" x2="22" y2="10" />
            </svg>
            Frais & Paiements
        </a>
        <a href="{% url 'actualites:reglement' %}" class="sidebar-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
            </svg>
            Règlement Intérieur
        </a>
        <a href="{% url 'notifications:notifications_list' %}" class="sidebar-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
            </svg>
            Messages
            {% if unread_notifications_count %}
            <span class="sidebar-badge">{{ unread_notifications_count }}</span>
            {% endif %}
        </a>
    </nav>

    <a href="{% url 'actualites:support' %}" class="contact-support-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" />
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
            <line x1="12" y1="17" x2="12.01" y2="17" />
        </svg>
        Besoin d'aide ?
    </a>
</aside>

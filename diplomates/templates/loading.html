<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Les Diplomates - Chargement...</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f48c25",
                        "background-light": "#f8f7f5",
                        "background-dark": "#221910",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                },
            },
        }
    </script>
    <style>
        @keyframes progress {
            0% {
                width: 0%;
            }

            50% {
                width: 60%;
            }

            100% {
                width: 100%;
            }
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.1;
            }

            50% {
                opacity: 0.2;
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .progress-bar {
            animation: progress 3s ease-in-out infinite;
        }

        .fade-in {
            animation: fadeIn 1s ease-out;
        }

        .pulse-animation {
            animation: pulse 2s ease-in-out infinite;
        }

        .float-animation {
            animation: float 3s ease-in-out infinite;
        }

        .loading-text {
            animation: fadeIn 1s ease-out infinite alternate;
        }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark font-display overflow-hidden">
    <div class="relative flex h-screen w-full flex-col items-center justify-center overflow-hidden">
        <div class="relative w-full max-w-[1200px] aspect-[16/9] flex flex-col items-center justify-center px-6">
            <div class="relative w-full h-[400px] flex items-end justify-center mb-12">
                <div class="absolute inset-0 flex items-center justify-center pulse-animation">
                    <span class="material-symbols-outlined text-[400px] text-primary">auto_awesome</span>
                </div>
                <div
                    class="relative w-full h-full max-w-4xl border-b-4 border-slate-200 dark:border-slate-800 flex items-end justify-center">
                    <div
                        class="absolute bottom-0 left-1/2 -translate-x-1/2 w-64 h-48 bg-slate-100 dark:bg-slate-800 rounded-t-xl border-x-4 border-t-4 border-slate-200 dark:border-slate-700 flex flex-col items-center justify-start p-4 float-animation">
                        <div class="w-12 h-16 bg-primary/20 rounded-t-sm mb-2 border-x-2 border-t-2 border-primary/40">
                        </div>
                        <div class="grid grid-cols-3 gap-2 w-full">
                            <div class="h-4 bg-slate-200 dark:bg-slate-700 rounded-sm"></div>
                            <div class="h-4 bg-slate-200 dark:bg-slate-700 rounded-sm"></div>
                            <div class="h-4 bg-slate-200 dark:bg-slate-700 rounded-sm"></div>
                        </div>
                    </div>
                    <div class="absolute bottom-0 left-[35%] w-12 h-32 flex flex-col items-center">
                        <div class="w-8 h-8 rounded-full bg-[#8d5524] mb-1"></div>
                        <div class="w-10 h-16 bg-primary rounded-t-lg relative">
                            <div class="absolute -left-2 top-2 w-3 h-10 bg-[#8d5524] rounded-full origin-top rotate-12">
                            </div>
                            <div
                                class="absolute -right-2 top-2 w-3 h-10 bg-[#8d5524] rounded-full origin-top -rotate-12">
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <div class="w-3 h-10 bg-slate-800 rounded-b-full"></div>
                            <div class="w-3 h-10 bg-slate-800 rounded-b-full"></div>
                        </div>
                    </div>
                    <div class="absolute bottom-0 left-[42%] w-10 h-28 flex flex-col items-center">
                        <div class="w-7 h-7 rounded-full bg-[#c68642] mb-1"></div>
                        <div class="w-9 h-14 bg-white border border-slate-200 rounded-t-lg relative">
                            <div
                                class="absolute -left-2 top-2 w-2.5 h-8 bg-[#c68642] rounded-full origin-top rotate-10">
                            </div>
                            <div
                                class="absolute -right-2 top-2 w-2.5 h-8 bg-[#c68642] rounded-full origin-top -rotate-10">
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <div class="w-2.5 h-8 bg-slate-800 rounded-b-full"></div>
                            <div class="w-2.5 h-8 bg-slate-800 rounded-b-full"></div>
                        </div>
                    </div>
                    <div
                        class="absolute top-10 right-20 w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center float-animation">
                        <span class="material-symbols-outlined text-primary text-4xl">lightbulb</span>
                    </div>
                </div>
            </div>
            <div class="text-center max-w-2xl fade-in">
                <h1 class="text-slate-900 dark:text-slate-100 text-4xl md:text-5xl font-bold mb-4 tracking-tight">
                    Complexe Scolaire Les Diplomates
                </h1>
                <p class="text-slate-500 dark:text-slate-400 text-lg md:text-xl font-light mb-8">
                    Former les leaders de demain avec excellence et innovation.
                </p>
                <div class="flex flex-col items-center gap-6">
                    <div class="w-64 h-1.5 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
                        <div class="h-full bg-primary progress-bar rounded-full"></div>
                    </div>
                    <p class="text-primary text-sm font-semibold uppercase tracking-widest loading-text">
                        Initialisation du portail académique...
                    </p>
                </div>
            </div>

            <script>
                // Redirection automatique après 3 secondes vers la vraie page d'accueil
                setTimeout(function () {
                    window.location.href = '/accueil/';
                }, 7000);

                // Animation du texte de chargement
                const loadingTexts = [
                    "Initialisation du portail académique...",
                    "Chargement des modules pédagogiques...",
                    "Configuration des profils utilisateurs...",
                    "Synchronisation des données...",
                    "Préparation de l'interface..."
                ];

                let currentIndex = 0;
                const loadingElement = document.querySelector('.loading-text');

                setInterval(function () {
                    currentIndex = (currentIndex + 1) % loadingTexts.length;
                    if (loadingElement) {
                        loadingElement.style.opacity = '0';
                        setTimeout(function () {
                            loadingElement.textContent = loadingTexts[currentIndex];
                            loadingElement.style.opacity = '1';
                        }, 500);
                    }
                }, 7000);
            </script>
</body>

</html>
